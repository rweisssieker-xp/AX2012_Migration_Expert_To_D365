name: Validate Plugin

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install export dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install openpyxl python-pptx

      - name: Validate plugin
        run: python plugins\ax-to-d365fo-migration-expert\scripts\migration_cli.py validate

      - name: Smoke test analyzer
        run: |
          python plugins\ax-to-d365fo-migration-expert\scripts\migration_cli.py analyze plugins\ax-to-d365fo-migration-expert\examples\sample-ax-inventory.csv plugins\ax-to-d365fo-migration-expert\examples\sample-xpp-class.xpp --output migration-analysis\ci

      - name: Smoke test exports
        run: python plugins\ax-to-d365fo-migration-expert\scripts\migration_cli.py export migration-analysis\ci --output migration-exports\ci

